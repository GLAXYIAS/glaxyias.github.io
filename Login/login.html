<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Null_X - Sign In</title>
    <style>
        :root {
            --bg-color: #0b0314;
            --container-bg: #140e24;
            --border-color: #8b3dff;
            --text-color: #ffffff;
            --text-secondary: #b3a1cf;
            --btn-primary: #8b3dff;
            --btn-secondary: #251b40;
            --input-bg: #1c1433;
            --input-border: #3b2d66;
            --error-color: #ff4a4a;
            --success-color: #00ff66;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: var(--container-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            width: 360px;
            box-shadow: 0 0 25px rgba(139, 61, 255, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .status-badge {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--success-color);
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .tab-container {
            display: flex;
            background-color: var(--btn-secondary);
            border-radius: 10px;
            margin-bottom: 30px;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background-color: var(--btn-primary);
            color: var(--text-color);
            font-weight: bold;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-color);
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-color: var(--border-color);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.9rem;
            user-select: none;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(45deg, #8b3dff, #b370ff);
            border: none;
            color: var(--text-color);
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(139, 61, 255, 0.4);
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .message-box {
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        .error-msg { color: var(--error-color); }
        .success-msg { color: var(--success-color); }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Null_X</h1>
        <div class="subtitle">Sign in for brand new features</div>
        <div class="status-badge" id="statusBadge">Direct Engine Active</div>

        <div class="tab-container">
            <button class="tab-btn active" id="tabCreate" onclick="setMode('signup')">Create Account</button>
            <button class="tab-btn" id="tabLogin" onclick="setMode('login')">Login</button>
        </div>

        <form id="authForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" required autocomplete="current-password">
                    <span class="toggle-password" onclick="togglePasswordVis()">👁️</span>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
        </form>

        <div class="message-box" id="messageBox"></div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Automatically mapped to your verified project endpoint
        const BASE_URL = 'https://ldojzaikkolrxkiwyqvq.supabase.co/rest/v1/users';
        
        // Your exact dashboard publishable key
        const ANON_KEY = 'sb_publishable_b3YUWIgrmUX1-Dl_Ee_4fg_MbKUuzrO';

        const headers = {
            'apikey': ANON_KEY,
            'Authorization': `Bearer ${ANON_KEY}`,
            'Content-Type': 'application/json'
        };

        let currentMode = 'signup';

        // --- INTERFACE UTILITIES ---
        function setMode(mode) {
            currentMode = mode;
            const tabCreate = document.getElementById('tabCreate');
            const tabLogin = document.getElementById('tabLogin');
            const submitBtn = document.getElementById('submitBtn');
            document.getElementById('messageBox').textContent = '';

            if (mode === 'signup') {
                tabCreate.classList.add('active');
                tabLogin.classList.remove('active');
                submitBtn.textContent = 'Create Account';
            } else {
                tabLogin.classList.add('active');
                tabCreate.classList.remove('active');
                submitBtn.textContent = 'Login';
            }
        }

        function togglePasswordVis() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }

        function showMessage(text, isError = true) {
            const msgBox = document.getElementById('messageBox');
            msgBox.textContent = text;
            msgBox.className = isError ? 'message-box error-msg' : 'message-box success-msg';
        }

        // --- REQUEST ROUTER ---
        function handleSubmit(event) {
            event.preventDefault();
            const userVal = document.getElementById('username').value.trim();
            const passVal = document.getElementById('password').value;

            if (currentMode === 'signup') {
                handleSignUp(userVal, passVal);
            } else {
                handleLogin(userVal, passVal);
            }
        }

        // --- SIGN UP / ACCOUNT CREATION ---
        async function handleSignUp(username, password) {
            try {
                // 1. Check if username is already taken inside your users table
                const checkUrl = `${BASE_URL}?username=eq.${encodeURIComponent(username)}&select=username`;
                const checkRes = await fetch(checkUrl, { method: 'GET', headers: headers });
                
                if (!checkRes.ok) throw new Error(`Database rejected request. Status: ${checkRes.status}`);
                const existingUsers = await checkRes.json();
                
                if (existingUsers.length > 0) {
                    showMessage('Username is already taken!');
                    return;
                }

                // 2. Insert new user credentials directly
                const insertRes = await fetch(BASE_URL, {
                    method: 'POST',
                    headers: { ...headers, 'Prefer': 'return=representation' },
                    body: JSON.stringify({ username: username, password: password })
                });

                if (insertRes.ok) {
                    showMessage('Account created successfully! Switching to login...', false);
                    setTimeout(() => { setMode('login'); }, 2000);
                } else {
                    throw new Error(`Insert failed. Status: ${insertRes.status}`);
                }
            } catch (err) {
                showMessage('Connection error: ' + err.message);
                console.error(err);
            }
        }

        // --- USER LOGIN ---
        async function handleLogin(username, password) {
            try {
                // Match the explicit username and password string combination
                const loginUrl = `${BASE_URL}?username=eq.${encodeURIComponent(username)}&password=eq.${encodeURIComponent(password)}&select=*`;
                const res = await fetch(loginUrl, { method: 'GET', headers: headers });
                
                if (!res.ok) throw new Error(`Server returned status: ${res.status}`);
                const userMatches = await res.json();

                if (userMatches.length > 0) {
                    showMessage('Login successful! Redirecting...', false);
                    localStorage.setItem('currentUser', username);
                    setTimeout(() => {
                        window.location.href = 'chat.html';
                    }, 1500);
                } else {
                    showMessage('Incorrect username or password.');
                }
            } catch (err) {
                showMessage('Connection error: ' + err.message);
                console.error(err);
            }
        }
    </script>
</body>
</html>
