<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Null_X Test Panel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a0a, #1a0033);
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: rgba(15, 15, 25, 0.95);
      padding: 40px 35px;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      border: 2px solid #8b00ff;
    }
    .tabs { display: flex; margin-bottom: 30px; background: #1f1f2e; border-radius: 12px; padding: 4px; }
    .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; border-radius: 10px; }
    .tab.active { background: #8b00ff; color: white; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; color: #c0c0c0; }
    input { width: 100%; padding: 14px 16px; background: #1f1f2e; border: 1px solid #4b0082; border-radius: 10px; color: #e0e0e0; }
    button { width: 100%; padding: 15px; background: linear-gradient(90deg, #8b00ff, #c084fc); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 10px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <h1>Null_X Test</h1>
  
  <div class="tabs">
    <div class="tab active" id="signupTab">Create Account</div>
    <div class="tab" id="loginTab">Login</div>
  </div>

  <div id="signupForm">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="signupUsername">
    </div>
    <button onclick="testSignup()">Create Account (Offline Test)</button>
  </div>

  <div id="loginForm" class="hidden">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUsername">
    </div>
    <button onclick="testLogin()">Login (Offline Test)</button>
  </div>
</div>

<script>
  // Simplified tab switching that doesn't use external networks
  document.getElementById('signupTab').addEventListener('click', () => {
    document.getElementById('signupForm').classList.remove('hidden');
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('signupTab').classList.add('active');
    document.getElementById('loginTab').classList.remove('active');
  });

  document.getElementById('loginTab').addEventListener('click', () => {
    document.getElementById('signupForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('signupTab').classList.remove('active');
    document.getElementById('loginTab').classList.add('active');
  });

  function testSignup() {
    alert("The create button works perfectly! The offline script is running fine.");
  }

  function testLogin() {
    alert("The login button works perfectly!");
  }
</script>
</body>
</html>
