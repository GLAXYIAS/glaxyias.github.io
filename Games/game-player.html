<script type="module">
    // 1. CLOAK LOCK (Keep this for stealth!)
    const currentTitle = localStorage.getItem('cloakTitle') || "Null_X";
    const currentIcon = localStorage.getItem('cloakIcon') || "../imgs/favicon.png";
    document.title = currentTitle;
    try { Object.defineProperty(document, 'title', { value: currentTitle, writable: false }); } catch(e) {}

    // 2. MAPPING (This is what you wanted back)
    const urlParams = new URLSearchParams(window.location.search);
    const gameId = urlParams.get('id');

    const gamePaths = {
        "s_lp": "slope/index.html",
        "d_md": "drivemad/index.html",
        "b_ft": "bulletforce/index.html",
        "p_em": "pokemon-emerald/index.html",
        "b_to": "brotato/index.html"
    };

    if (gameId && gamePaths[gameId]) {
        iframe.src = gamePaths[gameId];
    } else {
        window.location.href = "../index.html";
    }
</script>
