<!DOCTYPE html>
<html>
<head>
    <title>Null_X</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="game-frame"></iframe>

    <script>
        // 1. LOCK THE TITLE (Stops game names from leaking)
        const savedTitle = localStorage.getItem('cloakTitle') || "Null_X";
        document.title = savedTitle;
        
        // Prevent game scripts from changing the title
        Object.defineProperty(document, 'title', {
            value: savedTitle,
            writable: false
        });

        // 2. LOAD THE GAME
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const frame = document.getElementById('game-frame');

        // Mapping IDs to folders (Must be exactly your folder names)
        const paths = {
            "s_lp": "slope/index.html",
            "d_md": "drivemad/index.html",
            "b_ft": "bulletforce/index.html",
            "p_em": "pokemon-emerald/index.html",
            "b_to": "brotato/index.html"
        };

        if (id && paths[id]) {
            frame.src = paths[id];
        } else {
            // Fallback to Slope if something goes wrong
            frame.src = "slope/index.html";
        }
    </script>
</body>
</html>
