<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Null_X</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
  <div class="dashboard">
    
    <!-- Left Sidebar -->
<aside class="left-nav">
  <div class="logo">
    <img src="imgs/Screenshot 2026-01-27 8.17.07 PM.png" 
         alt="Null_X Logo" 
         class="site-logo">
  </div>
  
  <nav>
    <a href="#" class="nav-item active" id="nav-home">Home</a>
    <a href="#" class="nav-item" id="nav-games">Games</a>
    <a href="#" class="nav-item" id="nav-favorites">Favorites</a>
    <a href="#" class="nav-item" id="nav-unblockers">Unblockers</a>
    <a href="#" class="nav-item" id="nav-communications">Communications</a>
  </nav>
</aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <header class="top-bar">
        <div class="greeting" id="greeting">
          <h1>Hello, Guest</h1>
          <p>Find something fun to play.</p>
        </div>
        
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search games...">
        </div>
      </header>

      <section class="hero">
        <div class="hero-content">
          <span class="badge">Featured</span>
          <h2 id="hero-title">Loading...</h2>
          <p id="hero-desc">Please wait...</p>
          
          <div class="hero-actions">
            <button class="play-btn" id="playFeatured">Play Now</button>
            <button class="secondary-btn">Discover More</button>
          </div>
        </div>
      </section>

      <div class="random-section">
        <button class="quick-action-btn" id="randomBtn">Random Game</button>
      </div>

      <section class="section">
        <div class="game-grid" id="gameGrid">
          <!-- Games will go here -->
        </div>
      </section>
    </main>

    <!-- Right Sidebar -->
    <aside class="right-sidebar">
      <button class="signin-btn" id="signInBtn">Sign In</button>
      <button class="settings-btn" id="settingsBtn">Settings</button>
    </aside>
  </div>

  <script type="module" src="./JS/main.js"></script>
  <div id="settingsModal" class="modal-overlay">
  <div class="modal-box">
    <span class="close-x" id="closeSettings">&times;</span>
    <h1 class="glow">Settings</h1>
    
   <div class="setting-section">
  <h3>Panic Button</h3>
  <div class="panic-inputs">
    <p>Shortcut (e.g., 'p' or 'Escape'):</p>
    <input type="text" id="panicShortcut" placeholder="Press a key..." readonly>
    
    <p>Redirect Link:</p>
    <input type="text" id="panicLink" placeholder="https://classroom.google.com">
    
    <button id="savePanic" class="secondary-btn">Save Panic Settings</button>
  </div>
</div>
    </div>
  </div>
</div>
</body>
</html>
