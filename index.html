<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Null_X</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
  <div class="dashboard">
    
    <aside class="left-nav">
      <div class="logo">
        <img src="imgs/Screenshot 2026-01-27 8.17.07 PM.png" alt="Null_X Logo" class="site-logo">
      </div>
      
      <nav>
    <a href="index.html" class="nav-item active">Home</a>
    <a href="Games/game-player.html" class="nav-item">Games</a>
    <a href="favorites.html" class="nav-item">Favorites</a>
    <a href="unblockers.html" class="nav-item">Unblockers</a>
    <a href="profile/profile.html" class="nav-item">Profile</a>
    <a href="chat/chat.html" class="nav-item">Communications</a>
</nav>
    </aside>

    <main class="main-content">
      
      <header class="top-bar">
        <div class="greeting" id="greeting">
          <h1 id="welcome-text">Hello, Guest</h1>
          <p>Find something fun to play.</p>
        </div>
        
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search games...">
        </div>
      </header>

      <section class="hero" id="heroSection">
        <div class="hero-content">
          <span class="badge">Featured</span>
          <h2 id="hero-title">Loading...</h2>
          <p id="hero-desc">Please wait...</p>
          
          <div class="hero-actions">
            <button class="play-btn" id="playFeatured">Play Now</button>
            <button class="secondary-btn">Discover More</button>
          </div>
        </div>
      </section>

      <div class="random-section">
        <button class="quick-action-btn" id="randomBtn">Random Game</button>
      </div>

      <section class="section">
        <div class="game-grid" id="gameGrid">
        </div>
      </section>
    </main>

    <aside class="right-sidebar">
      <button class="signin-btn" id="signInBtn">Sign In</button>
      <button class="settings-btn" id="settingsBtn">Settings</button>
    </aside>
  </div>

  <div id="settingsModal" class="modal-overlay">
    <div class="modal-box">
      <span class="close-x" id="closeSettings">&times;</span>

      <h1 class="glow">Settings</h1>
      <p class="subtitle">Personalize your Null_X dashboard</p>
      <hr class="settings-divider">

      <div class="setting-section">
        <h3>Appearance</h3>
        <p class="setting-label">Select Theme:</p>
        <div class="theme-grid">
          <div class="theme-card" data-theme="default">
            <div class="preview purple-preview"></div>
            <span>Default Purple</span>
          </div>
          <div class="theme-card" data-theme="midnight">
            <div class="preview midnight-preview"></div>
            <span>Midnight</span>
          </div>
        </div>
      </div>

      <div class="setting-section">
        <h3>Privacy</h3>
        <label for="cloakSelector" class="setting-label">Tab Cloak:</label>
        <select id="cloakSelector" class="settings-input">
          <option value="none">None (Default)</option>
          <option value="Google Classroom">Google Classroom</option>
          <option value="Google Drive">Google Drive</option>
        </select>
      </div>

      <div class="setting-section">
        <h3>Panic Button</h3>
        <div class="panic-inputs">
          <p class="setting-label">Custom Shortcut Key:</p>
          <input type="text" id="panicShortcut" placeholder="Click and press a key..." readonly>
          
          <p class="setting-label">Redirect URL:</p>
          <input type="text" id="panicLink" placeholder="https://classroom.google.com">
          
          <button id="savePanic" class="save-btn">Save Panic Settings</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="JS/main.js"></script>
</body>
</html>
